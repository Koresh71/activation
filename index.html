<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Центр активации Nano Banana PRO</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; }
        .logo { font-size: 60px; margin-bottom: 10px; }
        h1 { color: #2c3e50; margin-bottom: 25px; font-size: 24px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 8px; font-size: 18px; font-family: monospace; text-align: center; box-sizing: border-box; }
        input:focus { border-color: #3498db; outline: none; }
        
        .btn-main { background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-main:hover { background: #219150; }
        
        #result-box { margin-top: 30px; padding: 20px; background: #f8f9fa; border: 2px dashed #bdc3c7; border-radius: 8px; display: none; }
        .key-text { font-family: 'Consolas', monospace; font-size: 24px; color: #2c3e50; font-weight: bold; display: block; margin: 10px 0; letter-spacing: 1px; }
        
        .btn-copy { background: #34495e; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-size: 14px; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-copy:hover { background: #2c3e50; }
        .copy-success { background: #27ae60 !important; }

        .footer-text { font-size: 12px; color: #bdc3c7; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">🍌</div>
    <h1>Активация лицензии</h1>
    <p style="color: #7f8c8d; font-size: 14px; margin-bottom: 20px;">Введите ID устройства из программы</p>
    
    <input type="text" id="hwidInput" placeholder="A1B2C3D4E5F6" maxlength="12">
    <button class="btn-main" onclick="generateLicense()">ПОЛУЧИТЬ КЛЮЧ</button>

    <div id="result-box">
        <span style="font-size: 14px; color: #7f8c8d;">Ваш лицензионный ключ:</span>
        <span id="finalKey" class="key-text"></span>
        <button id="copyBtn" class="btn-copy" onclick="copyKey()">📋 КОПИРОВАТЬ КЛЮЧ</button>
    </div>

    <p class="footer-text">© 2026 Илья Корнилов. Все права защищены.</p>
</div>

<script>
    async function generateLicense() {
        const hwid = document.getElementById('hwidInput').value.trim().toUpperCase();
        const salt = "BANANA-PRO-2026-KORNILOV"; 

        if (hwid.length < 5) {
            alert("Пожалуйста, введите корректный ID устройства");
            return;
        }

        const msgBuffer = new TextEncoder().encode(hwid + salt);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
        
        const key = hashHex.substring(0, 16);
        
        document.getElementById('finalKey').innerText = key;
        document.getElementById('result-box').style.display = 'block';
        
        // Сбрасываем кнопку копирования, если она была нажата ранее
        const btn = document.getElementById('copyBtn');
        btn.innerText = "📋 КОПИРОВАТЬ КЛЮЧ";
        btn.classList.remove('copy-success');
    }

    function copyKey() {
        const keyText = document.getElementById('finalKey').innerText;
        const btn = document.getElementById('copyBtn');

        navigator.clipboard.writeText(keyText).then(() => {
            btn.innerText = "✅ СКОПИРОВАНО";
            btn.classList.add('copy-success');
            
            setTimeout(() => {
                btn.innerText = "📋 КОПИРОВАТЬ КЛЮЧ";
                btn.classList.remove('copy-success');
            }, 2000);
        });
    }
</script>

</body>
</html>
