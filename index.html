<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Auth Hub | Система лицензирования</title>
    <style>
        :root { --bg: #0a0a0c; --card-bg: #111114; --text: #f0f0f2; --sub-text: #6b6b7b; --border: #1f1f23; --accent: #3b82f6; --accent-hover: #2563eb; }
        body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card-bg); padding: 45px; border-radius: 16px; border: 1px solid var(--border); width: 100%; max-width: 440px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center; }
        .tech-logo { font-size: 32px; margin-bottom: 20px; color: var(--accent); display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; background: rgba(59, 130, 246, 0.1); border-radius: 12px; border: 1px solid rgba(59, 130, 246, 0.2); }
        h1 { margin: 0 0 8px 0; font-size: 26px; font-weight: 700; letter-spacing: -1px; color: #fff; }
        .subtitle { color: var(--sub-text); font-size: 14px; margin-bottom: 35px; }
        .label { display: block; text-align: left; font-weight: 600; font-size: 11px; color: var(--sub-text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; }
        select, input { width: 100%; padding: 16px; margin-bottom: 24px; border: 1px solid var(--border); border-radius: 10px; background: #000; color: #fff; font-size: 16px; box-sizing: border-box; transition: 0.2s; appearance: none;}
        select { cursor: pointer; color: #3b82f6; font-weight: bold; }
        select option { background-color: #000; color: #ffffff; }
        select:focus, input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .btn-main { background: var(--accent); color: #fff; border: none; padding: 18px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-main:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); }
        .btn-main:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }
        #result-box { margin-top: 30px; padding: 25px; background: #000; border: 1px solid var(--accent); border-radius: 12px; display: none; animation: slideUp 0.4s ease-out; }
        .key-label { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 10px;}
        .key-text { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 24px; color: #fff; font-weight: 700; display: block; margin: 15px 0; letter-spacing: 3px; word-break: break-all;}
        .btn-copy { background: transparent; color: #fff; border: 1px solid var(--border); padding: 12px 24px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-copy:hover { border-color: var(--sub-text); background: rgba(255,255,255,0.05); }
        .copy-success { background: var(--accent) !important; border-color: var(--accent) !important; }
        .error-msg { color: #ef4444; margin-top: 15px; font-weight: bold; display: none; background: #2a1215; padding: 12px; border-radius: 8px; border: 1px solid #4a1c1c; font-size: 14px;}
        .footer { font-size: 11px; color: #333; margin-top: 40px; border-top: 1px solid var(--border); padding-top: 25px; font-weight: 500; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="tech-logo">🛡️</div>
    <h1>Core Auth Hub</h1>
    <p class="subtitle">Единая среда управления лицензиями ПО</p>
    
    <form id="activationForm">
        <span class="label">Выберите продукт</span>
        <select id="productSelect" required>
            <option value="" disabled selected>-- Выберите программу --</option>
            <option value="GROK">Grok Prompt Manager PRO</option>
            <option value="BANANA">Nano Banana Manager PRO</option>
            <option value="VEO">Veo Prompt Manager</option>
            <option value="SORA">Sora Prompt Manager</option>
            <option value="SEEDANCE">Seedance Prompt Manager</option>
            <option value="ACCOUNTS">Accounts Manager PRO</option>
            <option value="COMPILER">EXE Builder & Unpacker</option>
            <option value="MACPORT">Mac Port Master PRO</option>
        </select>

        <span class="label">Hardware ID (HWID)</span>
        <input type="text" id="hwidInput" placeholder="Вставьте ID устройства из программы" required>

        <span class="label">ПИН-Код Активации</span>
        <input type="text" id="pinInput" placeholder="Введите код, полученный при покупке" required>
        
        <button type="submit" class="btn-main" id="submitBtn">СГЕНЕРИРОВАТЬ КЛЮЧ</button>
    </form>

    <div class="error-msg" id="errorMsg"></div>

    <div id="result-box">
        <span class="key-label">Лицензия успешно выдана! Ваш ключ:</span>
        <span id="finalKey" class="key-text"></span>
        <button id="copyBtn" class="btn-copy" onclick="copyKey()">📋 КОПИРОВАТЬ</button>
    </div>

    <div class="footer">
        SECURITY PROTOCOL v2.1<br>
        © 2026 IK Designs. Все права защищены.
    </div>
</div>

<script>
    // =========================================================================
    // ВАША РАБОЧАЯ ССЫЛКА НА БАЗУ ДАННЫХ GOOGLE (ВШИТА)
    // =========================================================================
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxCoqjx-fV5a_dLUwTqyK_Jvt8wN9YxznUNZw1gUxGQhvZwOiNnQp6WAgvCS6YYXVN-/exec";

    document.getElementById('activationForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const hwid = document.getElementById('hwidInput').value.trim().toUpperCase();
        const pin = document.getElementById('pinInput').value.trim();
        const product = document.getElementById('productSelect').value;
        const btn = document.getElementById('submitBtn');
        const errorBox = document.getElementById('errorMsg');
        const resultBox = document.getElementById('result-box');

        if (!product) {
            errorBox.innerText = "Пожалуйста, выберите программу из списка.";
            errorBox.style.display = 'block';
            return;
        }

        btn.innerText = "ПРОВЕРКА ЛИЦЕНЗИИ...";
        btn.disabled = true;
        errorBox.style.display = 'none';
        resultBox.style.display = 'none';

        // Отправка данных в Google Таблицу
        const formData = new URLSearchParams();
        formData.append('product', product);
        formData.append('hwid', hwid);
        formData.append('pin', pin);

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            btn.innerText = "СГЕНЕРИРОВАТЬ КЛЮЧ";
            btn.disabled = false;

            if (data.success) {
                document.getElementById('finalKey').innerText = data.key;
                resultBox.style.display = 'block';
                document.getElementById('activationForm').style.display = 'none';
            } else {
                errorBox.innerText = data.message;
                errorBox.style.display = 'block';
            }
        })
        .catch(error => {
            btn.innerText = "СГЕНЕРИРОВАТЬ КЛЮЧ";
            btn.disabled = false;
            errorBox.innerText = "Ошибка соединения с сервером лицензий. Проверьте интернет.";
            errorBox.style.display = 'block';
        });
    });

    function copyKey() {
        const keyText = document.getElementById('finalKey').innerText;
        const btn = document.getElementById('copyBtn');
        
        navigator.clipboard.writeText(keyText).then(() => {
            btn.innerText = "✅ СКОПИРОВАНО";
            btn.classList.add('copy-success');
            setTimeout(() => {
                btn.innerText = "📋 КОПИРОВАТЬ";
                btn.classList.remove('copy-success');
            }, 2000);
        });
    }

    // Авто-выбор программы из URL (если вы даете прямую ссылку типа ?prod=GROK)
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const prod = urlParams.get('prod');
        if (prod) {
            const select = document.getElementById('productSelect');
            for (let i = 0; i < select.options.length; i++) {
                if (select.options[i].value === prod) {
                    select.value = prod;
                    break;
                }
            }
        }
    }
</script>

</body>
</html>
